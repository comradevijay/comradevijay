name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Step 1: Checkout your profile repo ──────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Step 2: Generate Profile Summary Cards (the ONLY real action) ───
      #    Uses YOUR GITHUB_TOKEN — reads private + public contributions
      - name: Generate Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: comradevijay
          BRANCH_NAME: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
