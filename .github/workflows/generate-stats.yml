name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: comradevijay
          BRANCH_NAME: main
          UTC_OFFSET: 5.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
